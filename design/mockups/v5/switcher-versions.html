<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NoteTakr — ⌘K palette · floating versions</title>
<link rel="stylesheet" href="kit.css">
<style>
  /* neutral surfaces (no purple tint; purple = accent / selection only) */
  #stage .window { background: rgba(40,40,46,0.5) !important; border-color: rgba(255,255,255,0.12) !important; }
  #stage .window.t-dark { background: #0f0f12 !important; border-color: rgba(255,255,255,0.07) !important; }
  #stage .window.t-light { background: #f4f4f6 !important; }
  #stage .window.t-light { --txt: rgba(24,24,27,0.92); --txt2: rgba(24,24,27,0.56); --txt3: rgba(24,24,27,0.42); --hover: rgba(0,0,0,0.05); --hairline: rgba(0,0,0,0.1); }

  .mtop { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    padding: 12px 24px; background: rgba(15,14,18,0.82); backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4); border-bottom: 1px solid rgba(255,255,255,0.08); }
  .mtop h1 { font-size: 14px; font-weight: 700; } .mtop h1 span { color: var(--purple-light); }
  .mtop .sub { font-size: 11.5px; color: var(--page-txt2); max-width: 560px; line-height: 1.45; }
  .mtop .spacer { flex: 1; }

  #stage { display: flex; flex-wrap: wrap; gap: 32px 26px; justify-content: center; align-items: flex-start; padding: 34px 24px 90px; }
  .card { display: flex; flex-direction: column; gap: 12px; width: 420px; }
  .cmeta { display: flex; flex-wrap: wrap; align-items: baseline; gap: 9px; }
  .cnum { font-size: 11px; font-weight: 700; color: var(--purple-light); letter-spacing: 0.12em; }
  .cmeta h3 { font-size: 14px; font-weight: 700; }
  .cmeta .toggle { margin-left: auto; font: inherit; font-size: 11px; color: var(--page-txt2); background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 4px 9px; cursor: pointer; }
  .cmeta .toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .cmeta p { flex-basis: 100%; font-size: 11.5px; color: var(--page-txt2); line-height: 1.45; }
  .window.mini { width: 420px; height: 500px; }

  /* ============ the note behind (gets blurred) ============ */
  .knote { position: absolute; inset: 0; z-index: 1; display: flex; flex-direction: column; }
  .knote .kbody { flex: 1; padding: 6px 24px 16px; overflow: hidden; }
  .knote h1.notetitle { margin: 4px 0 10px; }

  /* ============ ONE unified blur over the whole window — same as the window glass ============ */
  .kovl { position: absolute; inset: 0; z-index: 10; display: flex; flex-direction: column;
    backdrop-filter: blur(40px) saturate(1.5); -webkit-backdrop-filter: blur(40px) saturate(1.5);
    background: rgba(8,8,10,0.20); transition: opacity 0.18s; }
  .window.t-light .kovl { background: rgba(248,248,250,0.34); }
  .knote.closed ~ .kovl, .kovl.closed { opacity: 0; pointer-events: none; }

  /* top bar — shares the SAME blur surface (it's just the chrome strip on the overlay) */
  .ktop { flex: none; height: 40px; display: flex; align-items: center; gap: 8px; padding: 0 13px; }
  .ktop .lights { display: flex; gap: 8px; } .ktop .lights i { width: 12px; height: 12px; border-radius: 50%; background: var(--light-dot); }
  .window:hover .ktop .lights i:nth-child(1){ background:#ff5f57; } .window:hover .ktop .lights i:nth-child(2){ background:#febc2e; } .window:hover .ktop .lights i:nth-child(3){ background:#28c840; }
  .ktop .ktitle { position: absolute; left: 0; right: 0; text-align: center; font-size: 12px; color: var(--txt3); pointer-events: none; }

  /* search — floats directly on the blur, no box */
  .ksearch { flex: none; display: flex; align-items: center; gap: 10px; padding: 4px 18px 12px; }
  .ksearch svg { color: var(--txt3); flex: none; }
  .ksearch input { flex: 1; min-width: 0; border: 0; outline: 0; background: transparent; font: inherit; font-size: 15px; color: var(--txt); caret-color: var(--accent); }
  .ksearch input::placeholder { color: var(--txt3); }
  .ksearch .esc { font-size: 10px; color: var(--txt3); border: 1px solid var(--hairline); border-radius: 5px; padding: 2px 6px; }

  /* list — floating rows, generous spacing, NO overscroll past the last meeting */
  .klist { flex: 1; overflow-y: auto; overscroll-behavior: contain; padding: 4px 12px 12px; }
  .klist::-webkit-scrollbar { width: 0; }
  .kgroup { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--txt3); padding: 14px 10px 6px; }
  .klist > .kgroup:first-child { padding-top: 4px; }

  /* rows float on the blur — roomy */
  .krow { display: flex; align-items: center; gap: 13px; padding: 11px 12px; border-radius: 11px; cursor: default; border: 1px solid transparent; }
  .krow + .krow { margin-top: 3px; }
  .kicon { flex: none; width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; color: var(--txt2);
    background: color-mix(in srgb, var(--txt) 7%, transparent); }
  .kicon svg { width: 16px; height: 16px; }
  .kt { flex: 1; min-width: 0; }
  .kt .ktt { font-size: 13px; color: var(--txt); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kt .kts { font-size: 11px; color: var(--txt3); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kacc { flex: none; display: inline-flex; align-items: center; gap: 8px; }
  .ktime { font-size: 11px; color: var(--txt3); font-variant-numeric: tabular-nums; }
  .know { font-size: 8.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent);
    background: color-mix(in srgb, var(--accent) 14%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent); border-radius: 5px; padding: 2px 6px; }
  /* SOFT gray hover; purple ONLY for the selected row */
  .krow:hover { background: color-mix(in srgb, var(--txt) 5%, transparent); }
  .krow.sel { background: color-mix(in srgb, var(--accent) 12%, transparent); box-shadow: inset 2px 0 0 var(--accent); }

  /* footer hints — same blur surface */
  .kfoot { flex: none; height: 36px; display: flex; align-items: center; gap: 10px; padding: 0 18px; border-top: 1px solid var(--hairline); font-size: 10.5px; color: var(--txt3); }
  .kfoot .sp { flex: 1; }
  kbd.k { font-size: 10px; }
  .noresult { padding: 28px; text-align: center; color: var(--txt3); font-size: 12.5px; }

  /* ---- Variant 2: rows are little floating CARDS ---- */
  .v-cards .krow { background: var(--panel-fill); border: 1px solid var(--hairline); }
  .v-cards .krow + .krow { margin-top: 7px; }
  .v-cards .krow:hover { background: var(--hover); }
  .v-cards .krow.sel { background: color-mix(in srgb, var(--accent) 13%, transparent); border-color: color-mix(in srgb, var(--accent) 32%, transparent); box-shadow: 0 4px 14px rgba(0,0,0,0.22); }

  /* ---- Variant 3: spacious / spotlight ---- */
  .v-spacious .ksearch { padding: 6px 20px 14px; } .v-spacious .ksearch input { font-size: 16px; }
  .v-spacious .krow { padding: 14px 14px; gap: 15px; }
  .v-spacious .kicon { width: 34px; height: 34px; } .v-spacious .kicon svg { width: 18px; height: 18px; }
  .v-spacious .kt .ktt { font-size: 13.5px; }
  .v-spacious .krow + .krow { margin-top: 5px; }

  .reopen { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 20; font: inherit; font-size: 11px;
    color: var(--txt2); background: var(--chip-fill); border: 1px solid var(--chip-line); border-radius: 999px; padding: 6px 13px; cursor: pointer;
    opacity: 0; pointer-events: none; transition: opacity 0.18s; }
  .knote.closed ~ .reopen { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>

<div class="mtop">
  <h1>Note<span>Takr</span> — ⌘K palette · floating</h1>
  <div class="sub">Rows <b style="color:var(--page-txt)">float</b> over the actual note — one blur for the whole window (top bar included), roomier rows, and you can't scroll past the last meeting. Click a row, type to filter, or press ⌘K to toggle.</div>
  <div class="spacer"></div>
  <div class="thememode" id="theme"><button class="on" data-theme="glass">Glass</button><button data-theme="dark">Dark</button><button data-theme="light">Light</button></div>
</div>

<div id="stage"></div>

<script>
var IC = {
  cam:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="13" height="12" rx="2.5"/><path d="M16 10.5 21 8v8l-5-2.5"/></svg>',
  person:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 19.5c1.2-3.2 4-4.5 7-4.5s5.8 1.3 7 4.5"/></svg>',
  people:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8.5" cy="8.5" r="3"/><path d="M3 19c1-2.8 3.2-4 5.5-4s4.5 1.2 5.5 4"/><path d="M15.5 6a3 3 0 0 1 0 5.6"/><path d="M17.5 15c1.6.6 2.7 1.9 3.3 3.6"/></svg>',
  cal:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="5" width="16" height="15" rx="2.5"/><path d="M4 10h16M8 3v4M16 3v4"/></svg>',
  doc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h7l5 5v13H7z"/><path d="M14 3v5h5"/></svg>',
  search:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  gear:'<svg viewBox="0 0 16 16" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.6v2M8 12.4v2M1.6 8h2M12.4 8h2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M12.5 3.5l-1.4 1.4M4.9 11.1l-1.4 1.4"/></svg>'
};
var ITEMS = [
  { g:'Today', t:'Weekly Sync — Acme GmbH', s:'3 people · Zoom', time:'14:00', kind:'cam', current:true },
  { g:'Today', t:'1:1 Sarah', s:'2 people', time:'11:00', kind:'person' },
  { g:'Today', t:'Design Review', s:'Calendar · 4 invited', time:'16:00', kind:'cal' },
  { g:'Yesterday', t:'Investor Update Call', s:'4 people · Meet', time:'16:30', kind:'cam' },
  { g:'Yesterday', t:'Kundengespräch Müller GmbH', s:'In person · 2 people', time:'09:30', kind:'person' },
  { g:'Earlier', t:'Product Review', s:'5 people · Zoom', time:'Mon', kind:'doc' },
  { g:'Earlier', t:'Onboarding Call — Beta User', s:'2 people · Zoom', time:'Jun 2', kind:'cam' },
  { g:'Earlier', t:'Board Prep', s:'6 people', time:'May 28', kind:'people' },
  { g:'Earlier', t:'Sales Standup', s:'4 people', time:'May 27', kind:'people' }
];

var VERSIONS = [
  { id:'bare',     name:'Floating rows', cls:'v-bare', desc:'Bare rows directly on the blur — soft gray hover, purple only marks the selected row.' },
  { id:'cards',    name:'Floating cards', cls:'v-cards', desc:'Each row is a subtle translucent card that floats above the blurred note.' },
  { id:'spacious', name:'Spotlight (spacious)', cls:'v-spacious', desc:'Bigger search + roomier rows with larger icon tiles — maximum breathing room.' }
];

function noteHTML(){ return ''+
  '<div class="chrome"><div class="lights"><i></i><i></i><i></i></div><span class="wtitle">Weekly Sync — Acme</span><button class="gear">'+IC.gear+'</button></div>'+
  '<div class="kbody"><h1 class="notetitle">Weekly Sync — Acme GmbH</h1>'+
    '<div class="md"><p style="color:var(--txt2);font-size:12px">Today 14:00 · Acme HQ · Sarah, Tom, Luis</p>'+
    '<h2>Agenda</h2><ul><li>Q3 rollout status &amp; blockers</li><li>API migration timeline</li><li>Contract renewal — pricing tier</li></ul></div></div>'; }

function ovlHTML(){ return ''+
  '<div class="ktop"><div class="lights"><i></i><i></i><i></i></div><span class="ktitle">Switch meeting</span></div>'+
  '<div class="ksearch">'+IC.search+'<input type="text" placeholder="Search meetings…" data-input><span class="esc">esc</span></div>'+
  '<div class="klist" data-list></div>'+
  '<div class="kfoot"><kbd class="k">↩</kbd> Open<span class="sp"></span><kbd class="k">⌘N</kbd> New · <kbd class="k">esc</kbd> Close</div>'; }

var stage=document.getElementById('stage');
VERSIONS.forEach(function(V,i){
  var card=document.createElement('article'); card.className='card';
  var n=(i+1<10?'0':'')+(i+1);
  card.innerHTML='<div class="cmeta"><span class="cnum">'+n+'</span><h3>'+V.name+'</h3><button class="toggle">⌘K toggle</button><p>'+V.desc+'</p></div>'+
    '<div class="window mini '+V.cls+'" data-win><div class="knote" data-note>'+noteHTML()+'</div><div class="kovl" data-ovl>'+ovlHTML()+'</div>'+
    '<button class="reopen" data-reopen>Press ⌘K to open the switcher</button></div>';
  stage.appendChild(card);

  var win=card.querySelector('[data-win]');
  var note=card.querySelector('[data-note]'), ovl=card.querySelector('[data-ovl]'), list=win.querySelector('[data-list]'), input=win.querySelector('[data-input]');
  var sel=0, rows=[], shown=[];

  function rowHTML(it){
    return '<div class="krow" data-row data-key="'+(it.t+' '+(it.s||'')).toLowerCase()+'">'+
      '<span class="kicon">'+IC[it.kind]+'</span>'+
      '<span class="kt"><div class="ktt">'+it.t+'</div><div class="kts">'+(it.s||'')+'</div></span>'+
      '<span class="kacc">'+(it.current?'<span class="know">now</span>':'')+'<span class="ktime">'+it.time+'</span></span></div>';
  }
  function render(q){
    q=(q||'').toLowerCase().trim(); var html='', lastG=null; shown=[];
    var items=ITEMS.filter(function(it){ return !q || (it.t+' '+(it.s||'')).toLowerCase().indexOf(q)>-1; });
    items.forEach(function(it){ if(it.g!==lastG){ html+='<div class="kgroup">'+it.g+'</div>'; lastG=it.g; } html+=rowHTML(it); shown.push(it); });
    if(!shown.length){ list.innerHTML='<div class="noresult">No meetings match “'+q+'”.</div>'; rows=[]; return; }
    list.innerHTML=html; rows=[].slice.call(list.querySelectorAll('[data-row]'));
    if(sel>=rows.length) sel=rows.length-1; if(sel<0) sel=0; mark();
    rows.forEach(function(r,i){ r.addEventListener('mouseenter',function(){ sel=i; mark(); }); r.addEventListener('click',function(){}); });
  }
  function mark(){ rows.forEach(function(r,i){ r.classList.toggle('sel', i===sel); }); if(rows[sel]) rows[sel].scrollIntoView({block:'nearest'}); }
  function open(){ note.classList.remove('closed'); ovl.classList.remove('closed'); input.focus(); }
  function close(){ note.classList.add('closed'); ovl.classList.add('closed'); }

  render('');
  input.addEventListener('input',function(){ sel=0; render(input.value); });
  input.addEventListener('keydown',function(e){
    if(e.key==='ArrowDown'){ e.preventDefault(); sel=Math.min(sel+1, rows.length-1); mark(); }
    else if(e.key==='ArrowUp'){ e.preventDefault(); sel=Math.max(sel-1, 0); mark(); }
    else if(e.key==='Escape'){ close(); }
  });
  card.querySelector('[data-reopen]').addEventListener('click',open);
  card.querySelector('.toggle').addEventListener('click',function(){ note.classList.contains('closed')?open():close(); });
  win.tabIndex=0;
  win.addEventListener('keydown',function(e){ if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){ e.preventDefault(); note.classList.contains('closed')?open():close(); } });
});

/* theme toggle (all windows) */
var theme=document.getElementById('theme');
theme.querySelectorAll('button').forEach(function(b){ b.addEventListener('click',function(){
  theme.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on');
  document.querySelectorAll('[data-win]').forEach(function(w){ w.classList.remove('t-dark','t-light'); if(b.dataset.theme!=='glass') w.classList.add('t-'+b.dataset.theme); });
}); });
</script>
</body>
</html>
