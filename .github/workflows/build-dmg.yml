name: Build DMG

on:
  workflow_dispatch:
  push:
    branches: ["**"]

jobs:
  dmg:
    name: Build unsigned .dmg
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_PATH="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -r | head -1 || true)"
          if [[ -z "$XCODE_PATH" && -d /Applications/Xcode.app ]]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          if [[ -z "$XCODE_PATH" ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          XCODE_VERSION="$(xcodebuild -version | awk '/^Xcode / {print $2}')"
          XCODE_MAJOR="${XCODE_VERSION%%.*}"
          if [[ "${XCODE_MAJOR:-0}" -lt 16 ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support; selected Xcode $XCODE_VERSION."
            exit 1
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr

      - name: Archive (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr \
            -configuration Release \
            -archivePath "$PWD/build/NoteTakr.xcarchive" \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=14.0 \
            | tee /tmp/archive.log

      - name: Stage .app and create .dmg
        run: |
          APP=$(find "$PWD/build/NoteTakr.xcarchive/Products/Applications" -maxdepth 1 -name '*.app' | head -1)
          echo "App bundle: $APP"
          test -n "$APP"
          rm -rf dmg-staging && mkdir -p dmg-staging
          cp -R "$APP" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "NoteTakr" -srcfolder dmg-staging -ov -format UDZO NoteTakr.dmg
          ls -lh NoteTakr.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteTakr-dmg
          path: NoteTakr.dmg
          if-no-files-found: error

      - name: Upload archive log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: archive-log
          path: /tmp/archive.log
