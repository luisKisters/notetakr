name: Build DMG

on:
  workflow_dispatch:
  push:
    branches: ["dmg-build"]

jobs:
  dmg:
    name: Build unsigned .dmg
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Archive (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr \
            -configuration Release \
            -archivePath "$PWD/build/NoteTakr.xcarchive" \
            -destination 'generic/platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MACOSX_DEPLOYMENT_TARGET=13.0 \
            | tee /tmp/archive.log

      - name: Stage .app and create .dmg
        run: |
          APP=$(find "$PWD/build/NoteTakr.xcarchive/Products/Applications" -maxdepth 1 -name '*.app' | head -1)
          echo "App bundle: $APP"
          test -n "$APP"
          rm -rf dmg-staging && mkdir -p dmg-staging
          cp -R "$APP" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "NoteTakr" -srcfolder dmg-staging -ov -format UDZO NoteTakr.dmg
          ls -lh NoteTakr.dmg

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteTakr-dmg
          path: NoteTakr.dmg
          if-no-files-found: error

      - name: Upload archive log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: archive-log
          path: /tmp/archive.log
