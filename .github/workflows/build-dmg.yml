name: Release DMG

on:
  workflow_run:
    workflows: ["macOS CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish a GitHub Release for this run"
        required: false
        type: boolean
        default: false
permissions:
  contents: write
  actions: read

env:
  APP_NAME: NoteTakr
  BUNDLE_ID: com.notetakr.app
  SCHEME: NoteTakr
  SPARKLE_VERSION: 2.9.3
  XCODEPROJ: Notetakr.xcodeproj

jobs:
  quality-gate:
    name: Require a successful CI run for this commit
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.gate.outputs.release_sha }}
    steps:
      - name: Verify tested commit
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          CI_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CI_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_run" ]]; then
            if [[ "$CI_HEAD_BRANCH" != "main" || "$CI_CONCLUSION" != "success" ]]; then
              echo "::error::Release blocked: macOS CI for main concluded '$CI_CONCLUSION'."
              exit 1
            fi
            RELEASE_SHA="$CI_HEAD_SHA"
          else
            RELEASE_SHA="$GITHUB_SHA"
            MAIN_SHA="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
            if [[ "$RELEASE_SHA" != "$MAIN_SHA" ]]; then
              echo "::error::Manual releases are restricted to the current main commit ($MAIN_SHA)."
              exit 1
            fi
            SUCCESSFUL_RUNS="$(
              gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow macos-ci.yml \
                --commit "$RELEASE_SHA" \
                --status success \
                --limit 20 \
                --json conclusion,headSha \
                --jq 'map(select(.conclusion == "success")) | length'
            )"
            if [[ "$SUCCESSFUL_RUNS" == "0" ]]; then
              echo "::error::Release blocked: this commit has no successful macOS CI run."
              exit 1
            fi
          fi

          if [[ -z "$RELEASE_SHA" ]]; then
            echo "::error::Release blocked: no tested commit SHA was resolved."
            exit 1
          fi
          echo "release_sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Release is gated to tested commit $RELEASE_SHA."

  dmg:
    name: Build tested .dmg (ad-hoc by default; signs, notarizes & releases when signing secrets exist)
    needs: quality-gate
    runs-on: macos-15
    env:
      RELEASE_SHA: ${{ needs.quality-gate.outputs.release_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.quality-gate.outputs.release_sha }}

      - name: Select Xcode 16
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' -print 2>/dev/null | sort -r | head -1 || true)"
          if [[ -z "$XCODE_PATH" && -d /Applications/Xcode.app ]]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          if [[ -z "$XCODE_PATH" ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          XCODE_VERSION="$(xcodebuild -version | awk '/^Xcode / {print $2}')"
          XCODE_MAJOR="${XCODE_VERSION%%.*}"
          if [[ "${XCODE_MAJOR:-0}" -lt 16 ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support; selected Xcode $XCODE_VERSION."
            exit 1
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}

      - name: Detect signing configuration
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            BUILD_CERTIFICATE_BASE64 \
            P12_PASSWORD \
            KEYCHAIN_PASSWORD \
            APPLE_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_TEAM_ID \
            SPARKLE_PRIVATE_ED_KEY \
            SPARKLE_PUBLIC_ED_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("$name")
            fi
          done

          if [[ ${#missing[@]} -eq 0 ]]; then
            echo "SIGNING_ENABLED=true" >> "$GITHUB_ENV"
            echo "All signing/notarization secrets present: building a signed, notarized release."
          else
            echo "SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            echo "::warning::Signing/notarization secrets missing; building an AD-HOC signed (not notarized) DMG and skipping notarization and the in-app Sparkle feed. The DMG is still released and installable via Homebrew."
            printf 'Missing signing/notarization secrets (full Developer ID path disabled):\n'
            printf '  - %s\n' "${missing[@]}"
          fi

      - name: Import Developer ID certificate
        if: env.SIGNING_ENABLED == 'true'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id-application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project "$XCODEPROJ" \
            -scheme "$SCHEME"

      - name: Compute release version
        run: |
          set -euo pipefail
          MARKETING_VERSION="$(xcodebuild -project "$XCODEPROJ" -scheme "$SCHEME" -configuration Release -showBuildSettings 2>/dev/null | awk -F= '/ MARKETING_VERSION / {gsub(/[[:space:]]/, "", $2); print $2; exit}')"
          if [[ -z "$MARKETING_VERSION" ]]; then
            echo "Could not determine MARKETING_VERSION from Xcode build settings."
            exit 1
          fi

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          RELEASE_TAG="v${MARKETING_VERSION}-${BUILD_NUMBER}"
          DMG_NAME="${APP_NAME}-${MARKETING_VERSION}-${BUILD_NUMBER}.dmg"
          SPARKLE_FEED_URL="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/gh-pages/appcast.xml"

          {
            echo "MARKETING_VERSION=$MARKETING_VERSION"
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "RELEASE_TAG=$RELEASE_TAG"
            echo "DMG_NAME=$DMG_NAME"
            echo "SPARKLE_FEED_URL=$SPARKLE_FEED_URL"
          } >> "$GITHUB_ENV"

          echo "Release: $RELEASE_TAG"
          echo "Sparkle feed: $SPARKLE_FEED_URL"

      - name: Archive (Release)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: |
          set -euo pipefail
          set -o pipefail
          ARCHIVE_ARGS=(
            -project "$XCODEPROJ"
            -scheme "$SCHEME"
            -configuration Release
            -archivePath "$PWD/build/$APP_NAME.xcarchive"
            -destination 'generic/platform=macOS'
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"
            MARKETING_VERSION="$MARKETING_VERSION"
            SPARKLE_FEED_URL="$SPARKLE_FEED_URL"
            MACOSX_DEPLOYMENT_TARGET=14.0
            ARCHS=arm64
          )
          if [[ "${SIGNING_ENABLED:-false}" == "true" ]]; then
            SIGNING_IDENTITY="${APPLE_DEVELOPER_ID_APPLICATION:-Developer ID Application}"
            ARCHIVE_ARGS+=(
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY"
              CODE_SIGN_STYLE=Manual
              DEVELOPMENT_TEAM="$APPLE_TEAM_ID"
              SPARKLE_PUBLIC_ED_KEY="$SPARKLE_PUBLIC_ED_KEY"
              OTHER_CODE_SIGN_FLAGS="--timestamp"
            )
          else
            # Free path: ad-hoc signature ("-"). Required for the app to launch on
            # Apple Silicon; not trusted by Gatekeeper, so installs need Homebrew
            # (strips quarantine) or a one-time "Open Anyway". No Sparkle public key
            # is embedded, so in-app updates stay off until the Developer ID path is on.
            # Library validation cannot validate ad-hoc Team IDs for embedded Sparkle,
            # so this unsigned path uses an archive-only entitlement to disable it.
            AD_HOC_ENTITLEMENTS="$RUNNER_TEMP/NoteTakr.ad-hoc.entitlements"
            cp NoteTakrApp/NoteTakr.entitlements "$AD_HOC_ENTITLEMENTS"
            /usr/libexec/PlistBuddy \
              -c "Add :com.apple.security.cs.disable-library-validation bool true" \
              "$AD_HOC_ENTITLEMENTS" 2>/dev/null || \
              /usr/libexec/PlistBuddy \
                -c "Set :com.apple.security.cs.disable-library-validation true" \
                "$AD_HOC_ENTITLEMENTS"
            ARCHIVE_ARGS+=(
              CODE_SIGN_IDENTITY="-"
              CODE_SIGN_STYLE=Manual
              CODE_SIGNING_REQUIRED=YES
              CODE_SIGNING_ALLOWED=YES
              CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO
              CODE_SIGN_ENTITLEMENTS="$AD_HOC_ENTITLEMENTS"
              DEVELOPMENT_TEAM=""
            )
          fi
          xcodebuild archive "${ARCHIVE_ARGS[@]}" | tee /tmp/archive.log

      - name: Create .dmg
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          APP=$(find "$PWD/build/$APP_NAME.xcarchive/Products/Applications" -maxdepth 1 -name '*.app' | head -1)
          echo "App bundle: $APP"
          test -n "$APP"

          if [[ "${SIGNING_ENABLED:-false}" == "true" ]]; then
            SIGNING_IDENTITY="${APPLE_DEVELOPER_ID_APPLICATION:-Developer ID Application}"
          else
            SIGNING_IDENTITY="-"
          fi

          bash scripts/resign-sparkle-framework.sh "$APP" "$SIGNING_IDENTITY"

          rm -rf dmg-staging && mkdir -p dmg-staging
          cp -R "$APP" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "$APP_NAME" -srcfolder dmg-staging -ov -format UDZO "$DMG_NAME"

          if [[ "${SIGNING_ENABLED:-false}" == "true" ]]; then
            codesign --force --timestamp --sign "$SIGNING_IDENTITY" "$DMG_NAME"
            codesign --verify --verbose=2 "$DMG_NAME"
          else
            echo "Ad-hoc build: verifying ad-hoc signature and ad-hoc signing the .dmg."
            codesign --verify --verbose=2 "$APP"
            codesign --force --sign - "$DMG_NAME"
          fi
          ls -lh "$DMG_NAME"

      - name: Notarize and staple .dmg
        if: env.SIGNING_ENABLED == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$DMG_NAME"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG_NAME"

      - name: Verify packaged .dmg
        run: |
          set -euo pipefail
          MOUNT_POINT="$RUNNER_TEMP/notetakr-dmg-verify"
          mkdir -p "$MOUNT_POINT"
          hdiutil verify "$DMG_NAME"
          hdiutil attach "$DMG_NAME" -readonly -nobrowse -mountpoint "$MOUNT_POINT"
          trap 'hdiutil detach "$MOUNT_POINT" -force >/dev/null 2>&1 || true' EXIT

          PACKAGED_APP="$MOUNT_POINT/$APP_NAME.app"
          test -d "$PACKAGED_APP"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PACKAGED_APP/Contents/Info.plist")" = "$BUNDLE_ID"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$PACKAGED_APP/Contents/Info.plist")" = "$MARKETING_VERSION"
          codesign --verify --deep --strict --verbose=2 "$PACKAGED_APP"
          test -x "$PACKAGED_APP/Contents/MacOS/$APP_NAME"
          hdiutil detach "$MOUNT_POINT"
          trap - EXIT

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoteTakr-dmg
          path: ${{ env.DMG_NAME }}
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.event_name == 'workflow_run' || github.event.inputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ "${SIGNING_ENABLED:-false}" == "true" ]]; then
            NOTES="Signed and notarized macOS DMG built from tested commit ${RELEASE_SHA}."
          else
            NOTES="$(cat <<NOTE
          Ad-hoc signed (not notarized) macOS DMG built from tested commit ${RELEASE_SHA}.

          **Install with Homebrew (no Gatekeeper prompt):**
          \`\`\`
          brew tap luiskisters/notetakr https://github.com/${GITHUB_REPOSITORY}
          brew install --cask notetakr
          \`\`\`

          **Or download the .dmg directly:** open it, drag NoteTakr to Applications, then launch it. macOS will block the first launch ("Apple could not verify ... is free of malware"). Open **System Settings -> Privacy & Security**, scroll down, and click **Open Anyway**, then confirm. This one-time step is only needed for direct downloads -- Homebrew installs skip it.
          NOTE
          )"
          fi
          gh release create "$RELEASE_TAG" "$DMG_NAME" \
            --target "$RELEASE_SHA" \
            --title "$APP_NAME $MARKETING_VERSION ($BUILD_NUMBER)" \
            --notes "$NOTES"

      - name: Update Homebrew cask
        if: github.event_name == 'workflow_run' || github.event.inputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          DMG_SHA256="$(shasum -a 256 "$DMG_NAME" | awk '{print $1}')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          rm -rf cask-publish
          git worktree add cask-publish refs/remotes/origin/main
          mkdir -p cask-publish/Casks

          cat > cask-publish/Casks/notetakr.rb <<RUBY
          cask "notetakr" do
            version "${MARKETING_VERSION},${BUILD_NUMBER}"
            sha256 "${DMG_SHA256}"

            url "https://github.com/${GITHUB_REPOSITORY}/releases/download/v#{version.csv.first}-#{version.csv.second}/${APP_NAME}-#{version.csv.first}-#{version.csv.second}.dmg",
                verified: "github.com/${GITHUB_REPOSITORY}/"
            name "${APP_NAME}"
            desc "Menu-bar meeting recorder with on-device transcription"
            homepage "https://github.com/${GITHUB_REPOSITORY}"

            app "${APP_NAME}.app"

            zap trash: [
              "~/Library/Application Support/${APP_NAME}",
              "~/Library/Caches/${BUNDLE_ID}",
              "~/Library/HTTPStorages/${BUNDLE_ID}",
              "~/Library/Preferences/${BUNDLE_ID}.plist",
              "~/Library/Saved Application State/${BUNDLE_ID}.savedState",
            ]
          end
          RUBY

          cd cask-publish
          git add Casks/notetakr.rb
          if git diff --cached --quiet; then
            echo "Cask already up to date."
            exit 0
          fi
          git commit -m "Update Homebrew cask for ${RELEASE_TAG} [skip ci]"
          git push origin HEAD:main

      - name: Download Sparkle tools
        if: env.SIGNING_ENABLED == 'true' && (github.event_name == 'workflow_run' || github.event.inputs.publish_release == 'true')
        run: |
          set -euo pipefail
          curl -fsSL \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/Sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/Sparkle"
          tar -xJf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$RUNNER_TEMP/Sparkle" --strip-components 1
          test -x "$RUNNER_TEMP/Sparkle/bin/generate_appcast"
          echo "SPARKLE_TOOLS_DIR=$RUNNER_TEMP/Sparkle" >> "$GITHUB_ENV"

      - name: Generate Sparkle appcast
        if: env.SIGNING_ENABLED == 'true' && (github.event_name == 'workflow_run' || github.event.inputs.publish_release == 'true')
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: |
          set -euo pipefail
          rm -rf appcast-staging
          mkdir -p appcast-staging
          cp "$DMG_NAME" appcast-staging/

          DOWNLOAD_URL_PREFIX="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/"
          printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | \
            "$SPARKLE_TOOLS_DIR/bin/generate_appcast" \
              --ed-key-file - \
              --download-url-prefix "$DOWNLOAD_URL_PREFIX" \
              --maximum-versions 1 \
              -o appcast.xml \
              appcast-staging

          test -s appcast.xml

      - name: Publish Sparkle appcast
        if: env.SIGNING_ENABLED == 'true' && (github.event_name == 'workflow_run' || github.event.inputs.publish_release == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages:refs/remotes/origin/gh-pages || true
          rm -rf appcast-publish

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add appcast-publish origin/gh-pages
          else
            git worktree add --detach appcast-publish
            cd appcast-publish
            git switch --orphan gh-pages
            git rm -rf . >/dev/null 2>&1 || true
            cd ..
          fi

          cp appcast.xml appcast-publish/appcast.xml
          cd appcast-publish
          git add appcast.xml
          git commit -m "Update Sparkle appcast for $RELEASE_TAG" || exit 0
          git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages

      - name: Delete temporary keychain
        if: always()
        run: |
          if [[ -n "${KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload archive log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: archive-log
          path: /tmp/archive.log
