name: macOS CI

# Source of truth for native compilation and macOS-only tests.
on:
  push:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: macos-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS)
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version
          swift --version

      - name: Swift package tests
        run: swift test --parallel

      - name: Build macOS app (xcodebuild)
        run: |
          set -o pipefail
          xcodebuild \
            -scheme NotetakrApp \
            -destination 'platform=macOS' \
            -derivedDataPath .build/derived \
            build
