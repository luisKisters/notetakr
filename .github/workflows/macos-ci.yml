name: macOS CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  workflow-lint:
    name: GitHub Actions workflow lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate workflows with actionlint
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION="1.7.12"
          ARCHIVE="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${ARCHIVE}" \
            -o "$RUNNER_TEMP/$ARCHIVE"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  $RUNNER_TEMP/$ARCHIVE" \
            | sha256sum --check
          tar -xzf "$RUNNER_TEMP/$ARCHIVE" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" .github/workflows/*.yml

  kit-tests:
    name: Kit Tests (Linux)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and test NoteTakrKit
        run: cd NoteTakrKit && swift test

  swift-package-tests:
    name: Swift Package Tests (macOS)
    needs: kit-tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' -print 2>/dev/null | sort -r | head -1 || true)"
          if [[ -z "$XCODE_PATH" && -d /Applications/Xcode.app ]]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          if [[ -z "$XCODE_PATH" ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          XCODE_VERSION="$(xcodebuild -version | awk '/^Xcode / {print $2}')"
          XCODE_MAJOR="${XCODE_VERSION%%.*}"
          if [[ "${XCODE_MAJOR:-0}" -lt 16 ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support; selected Xcode $XCODE_VERSION."
            exit 1
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}

      - name: Swift version
        run: swift --version

      - name: Build transcription probe
        run: swift build --target NoteTakrTranscriptionProbe

      - name: Run Swift package tests
        run: swift test

  convex-tests:
    name: Convex Tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: convex/package-lock.json

      - name: Install dependencies
        run: cd convex && npm ci

      - name: Run Convex tests
        env:
          TWENTY_TEST_BASE_URL: ${{ secrets.TWENTY_TEST_BASE_URL }}
          TWENTY_TEST_API_KEY: ${{ secrets.TWENTY_TEST_API_KEY }}
          ATTIO_TEST_API_KEY: ${{ secrets.ATTIO_TEST_API_KEY }}
        run: |
          HAS_LIVE_CRM=0
          if [[ -z "${TWENTY_TEST_BASE_URL}" || -z "${TWENTY_TEST_API_KEY}" ]]; then
            echo "::warning::Skipping Twenty live integration tests because TWENTY_TEST_BASE_URL or TWENTY_TEST_API_KEY repo secret is missing."
          else
            echo "Twenty live integration secrets are present; npm test will run the live suite."
            HAS_LIVE_CRM=1
          fi
          if [[ -z "${ATTIO_TEST_API_KEY}" ]]; then
            echo "::warning::Skipping Attio live integration tests because ATTIO_TEST_API_KEY repo secret is missing."
          else
            echo "Attio live integration secret is present; npm test will run the live suite."
            HAS_LIVE_CRM=1
          fi
          cd convex
          npm test
          npm run typecheck
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REPOSITORY}" == "luisKisters/notetakr" && "${HAS_LIVE_CRM}" != "1" ]]; then
            echo "::error::Canonical-repository pushes require Twenty or Attio test-tenant secrets so the live fake-contact/note suite cannot silently skip."
            exit 1
          fi

  xcode-build-and-test:
    name: Xcode Build & Test
    needs: kit-tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' -print 2>/dev/null | sort -r | head -1 || true)"
          if [[ -z "$XCODE_PATH" && -d /Applications/Xcode.app ]]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          if [[ -z "$XCODE_PATH" ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          XCODE_VERSION="$(xcodebuild -version | awk '/^Xcode / {print $2}')"
          XCODE_MAJOR="${XCODE_VERSION%%.*}"
          if [[ "${XCODE_MAJOR:-0}" -lt 16 ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support; selected Xcode $XCODE_VERSION."
            exit 1
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            .build
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr

      - name: Build and test (NoteTakr scheme)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr \
            -destination 'platform=macOS' \
            -skip-testing:NoteTakrUITests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee /tmp/xcodebuild.log
        continue-on-error: false

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: /tmp/xcodebuild.log

  gui-e2e:
    name: Hosted macOS GUI E2E
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [workflow-lint, kit-tests, swift-package-tests, convex-tests, xcode-build-and-test]
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          XCODE_PATH="$(find /Applications -maxdepth 1 -type d -name 'Xcode_16*.app' -print 2>/dev/null | sort -r | head -1 || true)"
          if [[ -z "$XCODE_PATH" && -d /Applications/Xcode.app ]]; then
            XCODE_PATH="/Applications/Xcode.app"
          fi
          if [[ -z "$XCODE_PATH" ]]; then
            echo "Xcode 16 is required for FluidAudio Swift tools 6.0 support."
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
          XCODE_VERSION="$(xcodebuild -version | awk '/^Xcode / {print $2}')"
          XCODE_MAJOR="${XCODE_VERSION%%.*}"
          if [[ "${XCODE_MAJOR:-0}" -lt 16 ]]; then
            echo "Xcode 16 is required; selected Xcode $XCODE_VERSION."
            exit 1
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData/SourcePackages
          key: ${{ runner.os }}-gui-e2e-spm-${{ hashFiles('Package.resolved', 'Notetakr.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Resolve package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr

      # Hosted runners can validate deterministic app UI and mock-recorder state only.
      # Real microphone, ScreenCaptureKit, TCC prompts, and YouTube audio require a
      # pre-authorized self-hosted physical Mac.
      - name: Run GUI E2E
        run: |
          set -o pipefail
          RESULT_BUNDLE="$RUNNER_TEMP/NoteTakr-GUI-E2E.xcresult"
          rm -rf "$RESULT_BUNDLE"
          xcodebuild test \
            -project Notetakr.xcodeproj \
            -scheme NoteTakr \
            -destination 'platform=macOS' \
            -only-testing:NoteTakrUITests \
            -parallel-testing-enabled NO \
            -resultBundlePath "$RESULT_BUNDLE" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | tee "$RUNNER_TEMP/notetakr-gui-e2e.log"

      - name: Capture desktop after failure
        if: failure()
        run: screencapture -x "$RUNNER_TEMP/notetakr-gui-e2e-failure.png" || true

      - name: Upload GUI E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notetakr-gui-e2e-diagnostics
          if-no-files-found: ignore
          retention-days: 14
          path: |
            ${{ runner.temp }}/NoteTakr-GUI-E2E.xcresult
            ${{ runner.temp }}/notetakr-gui-e2e.log
            ${{ runner.temp }}/notetakr-gui-e2e-failure.png
